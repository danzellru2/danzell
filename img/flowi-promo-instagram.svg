<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D16"/>
      <stop offset="100%" stop-color="#13121E"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4BFEF"/>
      <stop offset="100%" stop-color="#8B7FE8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7FE8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B7FE8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="phoneShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A3A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A1A28" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E2C"/>
      <stop offset="100%" stop-color="#191927"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7FE8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8B7FE8"/>
      <stop offset="70%" stop-color="#C4BFEF"/>
      <stop offset="100%" stop-color="#C4BFEF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#8B7FE8" flood-opacity="0.15"/>
    </filter>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="30" stdDeviation="50" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="300" y="80" width="480" height="860" rx="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgMain)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#8B7FE8" stroke-width="0.5">
    <line x1="0" y1="180" x2="1080" y2="180"/>
    <line x1="0" y1="360" x2="1080" y2="360"/>
    <line x1="0" y1="540" x2="1080" y2="540"/>
    <line x1="0" y1="720" x2="1080" y2="720"/>
    <line x1="0" y1="900" x2="1080" y2="900"/>
    <line x1="180" y1="0" x2="180" y2="1080"/>
    <line x1="360" y1="0" x2="360" y2="1080"/>
    <line x1="540" y1="0" x2="540" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/>
    <line x1="900" y1="0" x2="900" y2="1080"/>
  </g>

  <!-- Purple glow behind phone -->
  <ellipse cx="540" cy="520" rx="300" ry="260" fill="url(#glowGrad)" opacity="0.8"/>

  <!-- === PHONE MOCKUP === -->
  <g filter="url(#phoneShadow)">
    <!-- Phone body -->
    <rect x="300" y="80" width="480" height="860" rx="44" fill="url(#phoneShine)"/>
    <!-- Phone border -->
    <rect x="300" y="80" width="480" height="860" rx="44" fill="none" stroke="#3A3A50" stroke-width="1.5"/>

    <!-- Screen content clipped -->
    <g clip-path="url(#phoneClip)">
      <!-- Screen background -->
      <rect x="300" y="80" width="480" height="860" fill="#0E0E14"/>

      <!-- Status bar -->
      <rect x="300" y="80" width="480" height="40" fill="#0E0E14"/>
      <text x="326" y="106" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">6:50</text>

      <!-- Header area -->
      <rect x="300" y="120" width="480" height="60" fill="#0E0E14"/>
      <!-- Flowi logo text in header -->
      <text x="326" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#A89EEC">Flowi</text>
      <!-- Claro button -->
      <rect x="668" y="140" width="90" height="30" rx="8" fill="none" stroke="#3A3A50" stroke-width="1"/>
      <text x="713" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#888898" text-anchor="middle">⊙  Claro</text>

      <!-- Welcome text -->
      <text x="326" y="210" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#EEEDF8">Buenos días, padilla</text>
      <text x="326" y="232" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6B6B80">Tienes 2 tareas pendientes</text>

      <!-- Buttons row -->
      <rect x="326" y="244" width="180" height="32" rx="8" fill="none" stroke="#3A3A50" stroke-width="1"/>
      <text x="416" y="264" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#AAAABC" text-anchor="middle">⊙  Activar notificaciones</text>
      <rect x="516" y="244" width="148" height="32" rx="8" fill="none" stroke="#3A3A50" stroke-width="1"/>
      <text x="590" y="264" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#AAAABC" text-anchor="middle">⏱  Enviar alertas</text>

      <!-- Actividad reciente card -->
      <rect x="316" y="296" width="448" height="180" rx="14" fill="#16161F"/>
      <rect x="316" y="296" width="448" height="180" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
      <text x="338" y="322" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#EEEDF8">Actividad reciente</text>
      <!-- Add button -->
      <rect x="674" y="308" width="76" height="26" rx="7" fill="none" stroke="#3A3A50" stroke-width="1"/>
      <text x="712" y="325" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8B7FE8" text-anchor="middle">+ Añadir</text>
      <!-- Activity items -->
      <text x="338" y="352" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#DDDDEE">⏱  Bienvenido a Flowi. Comenzaste tu jornada.</text>
      <text x="356" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4A4A62">Ahora</text>
      <text x="338" y="394" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#DDDDEE">⏱  Agregaste 2 tareas nuevas.</text>
      <text x="356" y="412" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4A4A62">Hace 10 min</text>
      <text x="338" y="436" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#DDDDEE">⏱  Completaste una tarea</text>
      <text x="356" y="454" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4A4A62">Hace 25 min</text>

      <!-- Stats cards row 1 -->
      <!-- Card: Total tareas -->
      <rect x="316" y="490" width="216" height="130" rx="14" fill="#16161F"/>
      <rect x="316" y="490" width="216" height="130" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
      <rect x="334" y="506" width="34" height="34" rx="9" fill="#222232"/>
      <text x="351" y="529" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8B8BAA" text-anchor="middle">✓</text>
      <text x="334" y="580" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#EEEDF8">3</text>
      <text x="334" y="604" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6B6B80">Total tareas</text>

      <!-- Card: Completadas -->
      <rect x="548" y="490" width="216" height="130" rx="14" fill="#16161F"/>
      <rect x="548" y="490" width="216" height="130" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
      <rect x="566" y="506" width="34" height="34" rx="9" fill="#252538"/>
      <text x="583" y="529" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#A89EEC" text-anchor="middle">✓</text>
      <text x="566" y="580" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#EEEDF8">1</text>
      <text x="566" y="604" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6B6B80">Completadas</text>

      <!-- Stats cards row 2 -->
      <!-- Card: Pendientes -->
      <rect x="316" y="634" width="216" height="130" rx="14" fill="#16161F"/>
      <rect x="316" y="634" width="216" height="130" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
      <rect x="334" y="650" width="34" height="34" rx="9" fill="#28201A"/>
      <text x="351" y="673" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#E8934A" text-anchor="middle">⚡</text>
      <text x="334" y="724" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#EEEDF8">2</text>
      <text x="334" y="748" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6B6B80">Pendientes</text>

      <!-- Card: Pomodoros -->
      <rect x="548" y="634" width="216" height="130" rx="14" fill="#16161F"/>
      <rect x="548" y="634" width="216" height="130" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
      <rect x="566" y="650" width="34" height="34" rx="9" fill="#1E2228"/>
      <text x="583" y="673" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#6B8ABA" text-anchor="middle">⏱</text>
      <text x="566" y="724" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#EEEDF8">0</text>
      <text x="566" y="748" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#6B6B80">Pomodoros hoy</text>

      <!-- Bottom nav -->
      <rect x="300" y="860" width="480" height="80" fill="#111119"/>
      <rect x="300" y="860" width="480" height="1" fill="#2A2A3A"/>
      <!-- Nav items -->
      <text x="354" y="896" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#8B7FE8" text-anchor="middle">🏠</text>
      <text x="354" y="912" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#8B7FE8" text-anchor="middle">INICIO</text>
      <text x="432" y="896" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#555570" text-anchor="middle">✓</text>
      <text x="432" y="912" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#555570" text-anchor="middle">TAREAS</text>
      <text x="510" y="896" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#555570" text-anchor="middle">⏱</text>
      <text x="510" y="912" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#555570" text-anchor="middle">FOCUS</text>
      <text x="588" y="896" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#555570" text-anchor="middle">☆</text>
      <text x="588" y="912" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#555570" text-anchor="middle">HÁBITOS</text>
      <text x="666" y="896" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#555570" text-anchor="middle">📋</text>
      <text x="666" y="912" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#555570" text-anchor="middle">NOTAS</text>
      <text x="744" y="896" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#555570" text-anchor="middle">📅</text>
      <text x="744" y="912" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#555570" text-anchor="middle">CALENDAR</text>

      <!-- Phone notch -->
      <rect x="450" y="80" width="180" height="24" rx="0" fill="#0E0E14"/>
      <rect x="490" y="86" width="100" height="14" rx="7" fill="#1A1A24"/>
    </g>
  </g>

  <!-- === BRANDING TEXT LEFT === -->
  <!-- Top logo -->
  <g transform="translate(60, 60)">
    <!-- Icon mini -->
    <circle cx="28" cy="28" r="26" fill="#16161F"/>
    <path d="M 12 26 Q 28 14 44 26" fill="none" stroke="url(#purpleGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 10 32 Q 28 20 46 32" fill="none" stroke="#8B7FE8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="46" cy="32" r="4" fill="#8B7FE8"/>
    <!-- Name -->
    <text x="64" y="34" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="#EEEDF8">Flowi</text>
  </g>

  <!-- Left side headline — clipped to x=0..270 so nothing overlaps the phone -->
  <clipPath id="leftClip"><rect x="0" y="0" width="278" height="1080"/></clipPath>
  <g clip-path="url(#leftClip)">

  <text x="60" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="3" fill="#6B6B80">ORGANIZA · CRECE · GANA</text>

  <!-- Main headline left -->
  <text x="60" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" fill="#EEEDF8">Del caos</text>
  <text x="60" y="346" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" fill="url(#purpleGrad)">al control.</text>

  <!-- Divider line accent -->
  <rect x="60" y="368" width="160" height="2" rx="1" fill="url(#purpleGrad)"/>

  <!-- Sub text -->
  <text x="60" y="406" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#8888A0">Tu sistema de</text>
  <text x="60" y="426" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#8888A0">productividad para</text>
  <text x="60" y="446" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#8888A0">personas y PYME.</text>

  <!-- Feature pills -->
  <rect x="60" y="472" width="120" height="28" rx="14" fill="#1E1E2C"/>
  <rect x="60" y="472" width="120" height="28" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
  <text x="120" y="491" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A89EEC" text-anchor="middle">✓  Tareas</text>

  <rect x="60" y="510" width="120" height="28" rx="14" fill="#1E1E2C"/>
  <rect x="60" y="510" width="120" height="28" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
  <text x="120" y="529" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A89EEC" text-anchor="middle">✓  Hábitos</text>

  <rect x="60" y="548" width="120" height="28" rx="14" fill="#1E1E2C"/>
  <rect x="60" y="548" width="120" height="28" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
  <text x="120" y="567" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A89EEC" text-anchor="middle">✓  Focus</text>

  <rect x="60" y="586" width="120" height="28" rx="14" fill="#1E1E2C"/>
  <rect x="60" y="586" width="120" height="28" rx="14" fill="none" stroke="#2A2A3A" stroke-width="1"/>
  <text x="120" y="605" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#A89EEC" text-anchor="middle">✓  Calendario</text>

  </g>

  <!-- Bottom left CTA -->
  <rect x="60" y="890" width="200" height="50" rx="14" fill="#8B7FE8"/>
  <text x="160" y="920" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">flowi.site</text>

  <!-- Bottom tagline -->
  <text x="60" y="980" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#3A3A52">Organiza tu jornada. Aumenta tus ganancias.</text>

  <!-- Decorative dots top right -->
  <circle cx="980" cy="80" r="3" fill="#8B7FE8" opacity="0.4"/>
  <circle cx="1010" cy="80" r="3" fill="#8B7FE8" opacity="0.25"/>
  <circle cx="1040" cy="80" r="3" fill="#8B7FE8" opacity="0.12"/>
  <circle cx="980" cy="110" r="3" fill="#8B7FE8" opacity="0.25"/>
  <circle cx="1010" cy="110" r="3" fill="#8B7FE8" opacity="0.15"/>
  <circle cx="1040" cy="110" r="3" fill="#8B7FE8" opacity="0.08"/>
  <circle cx="980" cy="140" r="3" fill="#8B7FE8" opacity="0.12"/>
  <circle cx="1010" cy="140" r="3" fill="#8B7FE8" opacity="0.08"/>

  <!-- Accent line bottom -->
  <rect x="0" y="1072" width="1080" height="2" rx="1" fill="url(#accentLine)"/>
</svg>
